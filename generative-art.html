<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flow Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    opacity: 1; transition: opacity 0.3s; z-index: 100;
    background: rgba(0,0,0,0.5); padding: 12px 20px; border-radius: 14px;
  }
  #ui:hover { opacity: 1; }
  #btn-row { display: flex; gap: 10px; }
  #slider-row { display: flex; gap: 16px; align-items: center; }
  button {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-size: 12px; letter-spacing: 0.05em;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .slider-group {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .slider-group label {
    color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase; white-space: nowrap;
  }
  .slider-group input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px;
    background: rgba(255,255,255,0.25); border-radius: 2px; outline: none; cursor: pointer;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; cursor: pointer;
  }
  .slider-group span {
    color: rgba(255,255,255,0.45); font-size: 10px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="btn-row">
    <button id="btnPalette">Palette</button>
    <button id="btnClear">Clear</button>
    <button id="btnPause">Pause</button>
  </div>
  <div id="slider-row">
    <div class="slider-group">
      <label for="sldTurb">Turbulence</label>
      <input type="range" id="sldTurb" min="0.2" max="6" step="0.1" value="2.5">
      <span id="valTurb">2.5</span>
    </div>
    <div class="slider-group">
      <label for="sldScale">Scale</label>
      <input type="range" id="sldScale" min="0.0005" max="0.008" step="0.0001" value="0.0028">
      <span id="valScale">0.0028</span>
    </div>
    <div class="slider-group">
      <label for="sldWidth">Max Width</label>
      <input type="range" id="sldWidth" min="3" max="80" step="1" value="36">
      <span id="valWidth">36</span>
    </div>
    <div class="slider-group">
      <label for="sldDensity">Density</label>
      <input type="range" id="sldDensity" min="20" max="500" step="10" value="180">
      <span id="valDensity">180</span>
    </div>
    <div class="slider-group">
      <label for="sldMargin">Margin</label>
      <input type="range" id="sldMargin" min="0" max="40" step="1" value="5">
      <span id="valMargin">5</span>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;

// ── Perlin noise ──────────────────────────────────────────────────────
const P = new Uint8Array(512);
(function(){
  const base = new Uint8Array(256);
  for(let i=0;i<256;i++) base[i]=i;
  for(let i=255;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [base[i],base[j]] = [base[j],base[i]];
  }
  for(let i=0;i<512;i++) P[i]=base[i&255];
})();

function fade(t){ return t*t*t*(t*(t*6-15)+10); }
function lerp(a,b,t){ return a+t*(b-a); }
function grad(h,x,y){
  const v = h&3;
  return (v===0?x+y : v===1?-x+y : v===2?x-y : -x-y);
}
function noise2(x,y){
  const xi=Math.floor(x)&255, yi=Math.floor(y)&255;
  const xf=x-Math.floor(x), yf=y-Math.floor(y);
  const u=fade(xf), v=fade(yf);
  const aa=P[P[xi]+yi], ab=P[P[xi]+yi+1];
  const ba=P[P[xi+1]+yi], bb=P[P[xi+1]+yi+1];
  return lerp(
    lerp(grad(aa,xf,yf),   grad(ba,xf-1,yf),   u),
    lerp(grad(ab,xf,yf-1), grad(bb,xf-1,yf-1), u),
    v
  );
}

// ── Palettes ──────────────────────────────────────────────────────────
const PALETTES = [
  {
    name: 'Rincon',
    bg: '#f5efe6',
    colors:  ['#e07850', '#1b3a6b', '#7a9e7e', '#d4b483'],
    weights: [0.45,      0.25,      0.18,      0.12]
  },
  {
    name: 'Blueprint',
    bg: '#0d1b2a',
    colors:  ['#7ec8e3', '#c0533a', '#e8dcc8', '#5d7b8a'],
    weights: [0.45,      0.25,      0.18,      0.12]
  },
  {
    name: 'Verdant',
    bg: '#faf3e0',
    colors:  ['#2d5a27', '#5a7a3a', '#c9a84c', '#7a5c3a'],
    weights: [0.40,      0.28,      0.20,      0.12]
  },
  {
    name: 'Poppy',
    bg: '#f0f0f0',
    colors:  ['#c8253a', '#1a4fa0', '#d4a017', '#3a3a3a'],
    weights: [0.40,      0.28,      0.18,      0.14]
  },
  {
    name: 'Dusk',
    bg: '#1a1a2e',
    colors:  ['#e87a8a', '#8a5fcf', '#3ab8b8', '#e8b4c0'],
    weights: [0.40,      0.28,      0.20,      0.12]
  }
];
let paletteIdx = 0;

function weightedColor(palette) {
  let r = Math.random();
  let cumulative = 0;
  for (let i = 0; i < palette.colors.length; i++) {
    cumulative += palette.weights[i];
    if (r < cumulative) return palette.colors[i];
  }
  return palette.colors[palette.colors.length - 1];
}

// ── Flow field ────────────────────────────────────────────────────────
const CELL   = 12;
let SCALE      = 0.0028;
let SCALE2     = 0.006;
let TURBULENCE = 2.5;

let field = [];
let cols, rows;

function buildField() {
  cols  = Math.ceil(W / CELL) + 1;
  rows  = Math.ceil(H / CELL) + 1;
  field = new Float32Array(cols * rows);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const n1 = noise2(x * SCALE,  y * SCALE);
      const n2 = noise2(x * SCALE2 + 40, y * SCALE2);
      field[y * cols + x] = (n1 + n2 * 0.5) * Math.PI * TURBULENCE;
    }
  }
}

function fieldAngle(px, py) {
  const cx  = Math.min(Math.max((px / CELL) | 0, 0), cols - 1);
  const cy  = Math.min(Math.max((py / CELL) | 0, 0), rows - 1);
  return field[cy * cols + cx];
}

// ── Occupancy grid ────────────────────────────────────────────────────
const GRID_RES = 4;
let gridCols, gridRows;
let occupancy;

function initOccupancy() {
  gridCols  = Math.ceil(W / GRID_RES) + 1;
  gridRows  = Math.ceil(H / GRID_RES) + 1;
  occupancy = new Uint8Array(gridCols * gridRows);
}

function markOccupied(x, y, r) {
  const gr  = Math.ceil(r / GRID_RES);
  const gcx = (x / GRID_RES) | 0;
  const gcy = (y / GRID_RES) | 0;
  for (let dy = -gr; dy <= gr; dy++) {
    for (let dx = -gr; dx <= gr; dx++) {
      if (dx * dx + dy * dy > gr * gr) continue;
      const gx = gcx + dx;
      const gy = gcy + dy;
      if (gx < 0 || gx >= gridCols || gy < 0 || gy >= gridRows) continue;
      occupancy[gy * gridCols + gx] = 1;
    }
  }
}

function isOccupied(x, y, r) {
  const gr  = Math.ceil(r / GRID_RES);
  const gcx = (x / GRID_RES) | 0;
  const gcy = (y / GRID_RES) | 0;
  for (let dy = -gr; dy <= gr; dy++) {
    for (let dx = -gr; dx <= gr; dx++) {
      if (dx * dx + dy * dy > gr * gr) continue;
      const gx = gcx + dx;
      const gy = gcy + dy;
      if (gx < 0 || gx >= gridCols || gy < 0 || gy >= gridRows) continue;
      if (occupancy[gy * gridCols + gx]) return true;
    }
  }
  return false;
}

// ── Stroke constants ──────────────────────────────────────────────────
let NUM_STROKES = 180;
const STEP_SIZE = 3;
const MAX_STEPS = 500;
let MARGIN      = 5;
const MIN_W     = 3;
let MAX_W       = 36;

function traceStroke(sx, sy, width, color) {
  const halfW = width / 2;
  const points = [];
  let x = sx, y = sy;

  for (let i = 0; i < MAX_STEPS; i++) {
    if (x < 0 || x > W || y < 0 || y > H) break;
    if (isOccupied(x, y, halfW + MARGIN)) break;
    points.push({ x, y });
    const angle = fieldAngle(x, y);
    x += Math.cos(angle) * STEP_SIZE;
    y += Math.sin(angle) * STEP_SIZE;
  }

  // Mark occupancy after tracing so we only collide with OTHER strokes, not our own path
  for (const pt of points) {
    markOccupied(pt.x, pt.y, halfW);
  }

  return points;
}

function drawStroke(points, width, color) {
  if (points.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i < points.length - 1; i++) {
    const mx = (points[i].x + points[i + 1].x) / 2;
    const my = (points[i].y + points[i + 1].y) / 2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
  }
  ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

  ctx.lineWidth  = width;
  ctx.lineCap    = 'round';
  ctx.lineJoin   = 'round';
  ctx.strokeStyle = color;
  ctx.stroke();
}

// ── Generation ────────────────────────────────────────────────────────
let strokeQueue = [];
let paused = false;

function generate() {
  const palette = PALETTES[paletteIdx];
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  buildField();
  initOccupancy();

  strokeQueue = [];
  for (let i = 0; i < NUM_STROKES; i++) {
    const w     = lerp(MIN_W, MAX_W, Math.random() ** 2);
    const color = weightedColor(palette);
    strokeQueue.push({
      sx: Math.random() * W,
      sy: Math.random() * H,
      w,
      color
    });
  }

  drawNext();
}

function drawNext() {
  if (paused || strokeQueue.length === 0) return;
  const { sx, sy, w, color } = strokeQueue.shift();
  const pts = traceStroke(sx, sy, w, color);
  if (pts.length >= 6) drawStroke(pts, w, color);
  requestAnimationFrame(drawNext);
}

// ── Resize ────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generate();
}

// ── Events ────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);

document.getElementById('btnPalette').addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  generate();
});
document.getElementById('btnClear').addEventListener('click', () => {
  generate();
});
document.getElementById('btnPause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'Resume' : 'Pause';
  if (!paused) drawNext();
});

document.getElementById('sldTurb').addEventListener('input', function() {
  TURBULENCE = parseFloat(this.value);
  document.getElementById('valTurb').textContent = TURBULENCE.toFixed(1);
  generate();
});

document.getElementById('sldScale').addEventListener('input', function() {
  SCALE  = parseFloat(this.value);
  SCALE2 = SCALE * (0.006 / 0.0028);
  document.getElementById('valScale').textContent = SCALE.toFixed(4);
  generate();
});

document.getElementById('sldWidth').addEventListener('input', function() {
  MAX_W = parseInt(this.value);
  document.getElementById('valWidth').textContent = MAX_W;
  generate();
});

document.getElementById('sldDensity').addEventListener('input', function() {
  NUM_STROKES = parseInt(this.value);
  document.getElementById('valDensity').textContent = NUM_STROKES;
  generate();
});

document.getElementById('sldMargin').addEventListener('input', function() {
  MARGIN = parseInt(this.value);
  document.getElementById('valMargin').textContent = MARGIN;
  generate();
});

resize();
</script>
</body>
</html>
